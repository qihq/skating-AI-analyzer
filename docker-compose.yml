services:
  backend:
    image: skating-analyzer-backend:latest
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: skating-backend
    env_file: .env
    volumes:
      - ./data:/data
      - ./models:/models:ro
    ports:
      - "8000:8000"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: skating-frontend
    ports:
      - "8080:80"
    depends_on:
      - backend
    restart: unless-stopped

  backup:
    image: skating-analyzer-backend:latest
    container_name: skating-backup
    depends_on:
      - backend
    volumes:
      - ./data:/data:ro
      - ./backups:/backups
      - ./scripts/sqlite_online_backup_loop.py:/sqlite_online_backup_loop.py:ro
    command: ["python", "/sqlite_online_backup_loop.py"]
    restart: unless-stopped
